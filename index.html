<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorImage.Lab - Ultimate AR Solution</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-text { background: linear-gradient(135deg, #ff8da1, #ff5e78, #acb6e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .mirror { transform: scaleX(-1); }
        .glass { background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .gauge-bar { height: 12px; background: #f1f5f9; border-radius: 6px; overflow: hidden; position: relative; }
        .gauge-inner { height: 100%; transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-8 { p: 1.25rem; background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; font-weight: 700; transition: all 0.2s; font-size: 0.875rem; }
        .btn-8:hover { background: #f8fafc; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="step-1" class="flex flex-col items-center justify-center min-h-screen p-6">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black mb-2 gradient-text">Pro Expert Entry</h1>
            <p class="text-slate-400 text-sm font-medium">분석할 퍼스널 컬러 타입을 선택해 주세요.</p>
        </header>
        <div class="grid grid-cols-2 gap-3 w-full max-w-md">
            <button onclick="setup('봄웜 라이트')" class="btn-8 text-amber-500 border-amber-100">봄웜 라이트</button>
            <button onclick="setup('봄웜 브라이트')" class="btn-8 text-amber-600 border-amber-200">봄웜 브라이트</button>
            <button onclick="setup('여름 라이트')" class="btn-8 text-blue-500 border-blue-100">여름 라이트</button>
            <button onclick="setup('여름 뮤트')" class="btn-8 text-blue-600 border-blue-200">여름 뮤트</button>
            <button onclick="setup('가을 뮤트')" class="btn-8 text-orange-700 border-orange-100">가을 뮤트</button>
            <button onclick="setup('가을 딥')" class="btn-8 text-orange-800 border-orange-200">가을 딥</button>
            <button onclick="setup('겨울 브라이트')" class="btn-8 text-purple-600 border-purple-100">겨울 브라이트</button>
            <button onclick="setup('겨울 딥')" class="btn-8 text-purple-800 border-purple-200">겨울 딥</button>
        </div>
    </div>

    <div id="step-2" class="hidden relative h-screen w-full bg-black overflow-hidden">
        <div class="absolute inset-0 w-full h-full mirror">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <canvas id="overlay" class="absolute inset-0 w-full h-full"></canvas>
        </div>
        
        <div class="absolute top-6 right-6 flex flex-col gap-3 z-20">
            <div class="glass p-3 rounded-2xl min-w-[130px] shadow-2xl">
                <p class="text-[9px] font-bold text-slate-500 mb-1 tracking-widest text-center uppercase">Skin (L*)</p>
                <p id="live-skin-l" class="text-center font-mono text-xl font-black text-blue-600">0</p>
            </div>
            <div class="glass p-3 rounded-2xl min-w-[130px] shadow-2xl">
                <p class="text-[9px] font-bold text-slate-500 mb-1 tracking-widest text-center uppercase">Lip (a*)</p>
                <p id="live-lip-a" class="text-center font-mono text-xl font-black text-pink-500">0</p>
            </div>
            <div class="glass p-3 rounded-2xl min-w-[130px] shadow-2xl">
                <p class="text-[9px] font-bold text-slate-500 mb-1 tracking-widest text-center uppercase">Eye (L*)</p>
                <p id="live-eye-l" class="text-center font-mono text-xl font-black text-amber-800">0</p>
            </div>
        </div>

        <div class="absolute bottom-12 left-0 right-0 flex justify-center z-10">
            <button onclick="capture()" class="w-20 h-20 bg-white rounded-full border-[7px] border-white/40 shadow-3xl flex items-center justify-center active:scale-90 transition">
                <div class="w-16 h-16 bg-red-600 rounded-full border-2 border-white"></div>
            </button>
        </div>
    </div>

    <div id="step-3" class="hidden min-h-screen p-6 bg-white max-w-xl mx-auto">
        <header class="text-center mb-10 pt-4">
            <p class="text-[10px] font-extrabold text-slate-300 tracking-[0.4em] mb-2 uppercase">Analysis Report</p>
            <h2 id="final-type" class="text-4xl font-black gradient-text uppercase tracking-tight">-</h2>
            <p id="type-comment" class="mt-4 text-[13px] text-slate-600 font-medium px-4 leading-relaxed"></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5" id="report-grid">
            <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 flex flex-col">
                <div class="flex justify-between items-center mb-4"><span class="p-3 bg-orange-100 rounded-2xl text-2xl">🧴</span><span class="text-[10px] font-black text-slate-300">SKIN BRIGHTNESS</span></div>
                <h4 id="prod-base-name" class="font-bold text-sm mb-1"></h4>
                <div class="flex justify-between text-[11px] font-black text-slate-400 mt-2 mb-1"><span>Analysis Value</span><span id="pct-skin-l">0%</span></div>
                <div class="gauge-bar"><div id="gauge-skin-l" class="gauge-inner bg-gradient-to-r from-orange-200 to-orange-400" style="width: 0%"></div></div>
                <p id="prod-base-desc" class="text-[11px] text-slate-500 mt-4 leading-relaxed"></p>
            </div>

            <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 flex flex-col">
                <div class="flex justify-between items-center mb-4"><span class="p-3 bg-pink-100 rounded-2xl text-2xl">💄</span><span class="text-[10px] font-black text-slate-300">LIP VITALITY</span></div>
                <h4 id="prod-lip-name" class="font-bold text-sm mb-1"></h4>
                <div class="flex justify-between text-[11px] font-black text-slate-400 mt-2 mb-1"><span>Analysis Value</span><span id="pct-lip-a">0%</span></div>
                <div class="gauge-bar"><div id="gauge-lip-a" class="gauge-inner bg-gradient-to-r from-pink-300 to-rose-500" style="width: 0%"></div></div>
                <p id="prod-lip-desc" class="text-[11px] text-slate-500 mt-4 leading-relaxed"></p>
            </div>

            <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 flex flex-col">
                <div class="flex justify-between items-center mb-4"><span class="p-3 bg-purple-100 rounded-2xl text-2xl">🌸</span><span class="text-[10px] font-black text-slate-300">BLOOM LEVEL</span></div>
                <h4 id="prod-blush-name" class="font-bold text-sm mb-1"></h4>
                <div class="flex justify-between text-[11px] font-black text-slate-400 mt-2 mb-1"><span>Tone Balance</span><span>75%</span></div>
                <div class="gauge-bar"><div class="gauge-inner bg-gradient-to-r from-purple-200 to-purple-400" style="width: 75%"></div></div>
                <p id="prod-blush-desc" class="text-[11px] text-slate-500 mt-4 leading-relaxed"></p>
            </div>

            <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 flex flex-col">
                <div class="flex justify-between items-center mb-4"><span class="p-3 bg-blue-100 rounded-2xl text-2xl">🎨</span><span class="text-[10px] font-black text-slate-300">EYE DEPTH</span></div>
                <h4 id="prod-shadow-name" class="font-bold text-sm mb-1"></h4>
                <div class="flex justify-between text-[11px] font-black text-slate-400 mt-2 mb-1"><span>Eye Clarity</span><span id="pct-eye-l">0%</span></div>
                <div class="gauge-bar"><div id="gauge-eye-l" class="gauge-inner bg-gradient-to-r from-slate-400 to-slate-700" style="width: 0%"></div></div>
                <p id="prod-shadow-desc" class="text-[11px] text-slate-500 mt-4 leading-relaxed"></p>
            </div>
        </div>
        <button onclick="location.reload()" class="mt-12 w-full py-5 bg-slate-900 text-white rounded-3xl font-bold shadow-lg">New Consultation</button>
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        let faceLandmarker, video, canvas, ctx, hiddenCanvas, hiddenCtx;
        let currentType = "";
        let finalSkinLab = { l: 0 }, finalLipLab = { a: 0 }, finalEyeLab = { l: 0 };

        const productDB = {
            "봄웜": {
                comment: "밝고 생동감 넘치는 컬러가 잘 어울리는 유형입니다.",
                foundation: { name: "지베르니 밀착 커버 파운데이션 (21호 라이트 베이지)", desc: "노란 기가 과하지 않은 맑은 상아빛으로 투명한 피부를 연출합니다." },
                lip: { name: "롬앤 소르베 밤 / 데이지크 피치 푸딩", desc: "맑은 코랄과 살구색이 생기를 더해줍니다." },
                blush: { name: "퓌 푸딩팟 (CR01 디어)", desc: "뽀얀 복숭아 빛 제형이 피부에 부드럽게 스며듭니다." },
                shadow: { name: "웨이크메이크 (04 코랄 블러링)", desc: "따스한 코랄과 브라운 음영이 조화롭습니다." }
            },
            "여름쿨": {
                comment: "청량하고 부드러운 파스텔톤이나 뮤트한 컬러가 잘 어울리는 유형입니다.",
                foundation: { name: "VDL 커버 스테인 파운데이션 (A02)", desc: "핑크 베이스의 화사한 컬러가 피부톤을 맑게 보정해 줍니다." },
                lip: { name: "롬앤 베어 그레이프 / 피오니 발레", desc: "여름 뮤트나 라이트톤의 정석 컬러입니다." },
                blush: { name: "퓌 푸딩팟 (PK01 베이비)", desc: "맑은 딸기우유 핑크 컬러로 화사함을 살려줍니다." },
                shadow: { name: "웨이크메이크 (02 생기 블러링)", desc: "쿨한 핑크와 라벤더 계열의 실패 없는 조합입니다." }
            },
            "가을웜": {
                comment: "차분하고 깊이 있는 에너지가 느껴지는 컬러가 잘 어울리는 유형입니다.",
                foundation: { name: "정샘물 에센셜 스킨 누더 쿠션 (미디엄)", desc: "건강하고 자연스러운 피부 결 표현에 최적화되어 있습니다." },
                lip: { name: "페리페라 잉크 무드 글로이 틴트 (03 맘찍로즈)", desc: "차분한 무화과 로즈 컬러로 깊은 무드를 더해줍니다." },
                blush: { name: "누즈 리퀴드 케어 치크 (03 페일 블라썸)", desc: "고급스러운 뮤트 톤의 혈색을 부여합니다." },
                shadow: { name: "데이지크 (11 초콜릿 퍼지)", desc: "깊이감 있는 브라운 음영 메이크업에 최적입니다." }
            },
            "겨울쿨": {
                comment: "선명하고 강렬하거나, 아주 차가운 도시적인 컬러가 어울리는 유형입니다.",
                foundation: { name: "바닐라코 화이트 쿠션 (19 라이트)", desc: "대비감이 중요한 피부에 깨끗한 고명도 바탕을 만들어줍니다." },
                lip: { name: "페리페라 워터 베어 (06 생기매점)", desc: "선명한 쿨 핑크/레드 컬러가 안색을 밝혀줍니다." },
                blush: { name: "클리니크 치크 팝 (팬지 팝)", desc: "보라끼 섞인 핑크가 맑고 차갑게 발색됩니다." },
                shadow: { name: "웨이크메이크 (16 블랙 허쉬 블러링)", desc: "트렌디한 스모키 쿨 무드에 가장 적합한 팔레트입니다." }
            }
        };

        window.setup = async (type) => {
            currentType = type;
            document.getElementById("step-1").classList.add("hidden");
            document.getElementById("step-2").classList.remove("hidden");
            video = document.getElementById("video");
            canvas = document.getElementById("overlay"); ctx = canvas.getContext("2d");
            hiddenCanvas = document.getElementById("hidden-canvas"); hiddenCtx = hiddenCanvas.getContext("2d", { willReadFrequently: true });
            
            await initMediaPipe();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.onloadedmetadata = () => { video.play(); predict(); };
        };

        async function initMediaPipe() {
            const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                runningMode: "VIDEO", numFaces: 1
            });
        }

        function predict() {
            if (video.readyState < 2) { requestAnimationFrame(predict); return; }
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            hiddenCanvas.width = video.videoWidth; hiddenCanvas.height = video.videoHeight;

            const res = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (res.faceLandmarks && res.faceLandmarks.length > 0) {
                const lm = res.faceLandmarks[0];
                const points = { skin: lm[234], lip: lm[17], eye: lm[468] }; // 볼, 입술, 홍채

                Object.values(points).forEach(pt => {
                    ctx.beginPath(); ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 6, 0, 2*Math.PI);
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                });

                // 실시간 안정적 분석
                hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                const sRgb = getSafeRGB(points.skin);
                const lRgb = getSafeRGB(points.lip);
                const eRgb = getSafeRGB(points.eye);

                finalSkinLab = rgbToLab(sRgb);
                finalLipLab = rgbToLab(lRgb);
                finalEyeLab = rgbToLab(eRgb);

                document.getElementById("live-skin-l").innerText = finalSkinLab.l;
                document.getElementById("live-lip-a").innerText = finalLipLab.a;
                document.getElementById("live-eye-l").innerText = finalEyeLab.l;
            }
            requestAnimationFrame(predict);
        }

        function getSafeRGB(lm) {
            const px = Math.floor(lm.x * hiddenCanvas.width);
            const py = Math.floor(lm.y * hiddenCanvas.height);
            try {
                // 5x5 평균 추출로 노이즈 방지
                const d = hiddenCtx.getImageData(px-2, py-2, 5, 5).data;
                let r=0, g=0, b=0;
                for(let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
                return { r: r/25, g: g/25, b: b/25 };
            } catch(e) { return { r:128, g:128, b:128 }; }
        }

        function rgbToLab(rgb) {
            const L = Math.round((0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b) / 255 * 100);
            const a = Math.round(rgb.r - rgb.g + 128) - 128;
            return { l: L, a: a };
        }

        window.capture = () => {
            document.getElementById("step-2").classList.add("hidden");
            document.getElementById("step-3").classList.remove("hidden");
            document.getElementById("final-type").innerText = currentType;
            
            const mainKey = currentType.includes("봄") ? "봄웜" : currentType.includes("여름") ? "여름쿨" : currentType.includes("가을") ? "가을웜" : "겨울쿨";
            const data = productDB[mainKey];

            document.getElementById("type-comment").innerText = data.comment;
            document.getElementById("prod-base-name").innerText = data.foundation.name;
            document.getElementById("prod-base-desc").innerText = data.foundation.desc;
            document.getElementById("prod-lip-name").innerText = currentType.includes("뮤트") ? "롬앤 베어 그레이프" : (currentType.includes("라이트") ? "롬앤 피오니 발레" : data.lip.name);
            document.getElementById("prod-lip-desc").innerText = data.lip.desc;
            document.getElementById("prod-blush-name").innerText = data.blush.name;
            document.getElementById("prod-blush-desc").innerText = data.blush.desc;
            document.getElementById("prod-shadow-name").innerText = data.shadow.name;
            document.getElementById("prod-shadow-desc").innerText = `측정된 눈동자 명도(${finalEyeLab.l}%)를 고려한 퍼스널 컬러 맞춤 팔레트입니다.`;

            setTimeout(() => {
                const sl = finalSkinLab.l, la = finalLipLab.a, el = finalEyeLab.l;
                document.getElementById("gauge-skin-l").style.width = sl + "%";
                document.getElementById("pct-skin-l").innerText = sl + "%";
                document.getElementById("gauge-lip-a").style.width = Math.min(100, (la + 20) * 2) + "%";
                document.getElementById("pct-lip-a").innerText = Math.round(Math.min(100, (la + 20) * 2)) + "%";
                document.getElementById("gauge-eye-l").style.width = el + "%";
                document.getElementById("pct-eye-l").innerText = el + "%";
            }, 300);
        };
    </script>
</body>
</html>
